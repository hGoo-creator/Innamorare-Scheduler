<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Innamorare Studio - 예약 스케줄러</title>
  
  <!-- Google Fonts: Playfair Display for titles, Lato for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-cream: #FDF9F3;
      --text-brown: #4A3A2A;
      --text-muted: #8E7E70;
      --accent-gold: #C29B7F;
      --card-bg: #FFFFFF;
      --border-light: #E6E1DA;
      
      --pending-bg: #F6F1EA;
      --pending-border: #D4C4B7;
      --pending-text: #8E7E70;
      
      --confirmed-bg: #C29B7F;
      --confirmed-border: #B28B6E;
      --confirmed-text: #FFFFFF;
      
      --font-title: 'Playfair Display', serif;
      --font-body: 'Lato', sans-serif;
      --transition: all 0.3s ease;
      --shadow: 0 4px 15px rgba(74, 58, 42, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-cream);
      color: var(--text-brown);
      font-family: var(--font-body);
      font-size: 18px; /* Base size as requested */
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* Admin Toggle */
    .admin-link-wrapper {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      z-index: 999;
    }
    .admin-link {
      display: inline-block;
      font-size: 0.85rem;
      text-decoration: none;
      color: var(--text-muted);
      border: 1px solid var(--border-light);
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      background-color: var(--card-bg);
      cursor: pointer;
      font-family: var(--font-body);
      transition: var(--transition);
    }
    .admin-link:hover {
      color: var(--accent-gold);
      border-color: var(--accent-gold);
    }

    /* Header */
    header {
      text-align: center;
      padding: 4rem 1.5rem 2.5rem;
    }
    .sub-title {
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }
    h1 {
      font-family: var(--font-title);
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--text-brown);
      margin-bottom: 1rem;
    }
    .header-links-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .header-link-item {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: var(--text-brown);
      font-family: var(--font-title);
      font-size: 1.1rem;
      font-weight: 600;
      transition: opacity 0.3s ease;
    }
    .header-link-item:hover {
      opacity: 0.7;
    }
    .header-link-item.hidden {
      display: none;
    }

    /* Sections */
    .view-section {
      display: none;
    }
    .view-section.active {
      display: block;
    }



    /* Calendar Grid */
    .calendar-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .calendar-nav h2 {
      font-size: 1.8rem;
      font-weight: 600;
      font-family: var(--font-title);
    }
    .calendar-nav button {
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      padding: 0.5rem 1.2rem;
      cursor: pointer;
      border-radius: 4px;
      font-size: 1rem;
      font-family: var(--font-body);
      color: var(--text-brown);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background-color: var(--border-light);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      overflow: hidden;
      min-height: 600px; /* Fluid height requested */
      box-shadow: var(--shadow);
      margin-bottom: 3rem;
    }
    .day-header {
      background-color: var(--card-bg);
      padding: 1rem 0.5rem;
      text-align: center;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-muted);
    }
    .day-cell {
      background-color: var(--card-bg);
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      cursor: pointer;
      transition: background-color 0.2s ease;
      min-height: 100px; /* Ensures cells stretch if empty */
    }
    .day-cell:hover {
      background-color: #FAF6F0;
    }
    .day-cell.other-month {
      background-color: #FCFAF7;
      color: #D4C4B7;
    }
    .day-cell.today {
      border: 2px solid var(--accent-gold);
      background-color: #FFF;
    }
    .day-number {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    /* Event Badges */
    .booking-badge {
      font-size: 0.85rem;
      padding: 0.4rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      text-align: left; /* STRICT LEFT ALIGNMENT */
      padding-left: 5px; /* STRICT LEFT ALIGNMENT */
      overflow: hidden;
      line-height: 1.4;
      display: block;
      font-family: var(--font-body);
    }
    .badge-line-1 {
      font-weight: 700;
      display: block;
      margin-bottom: 0.1rem;
    }
    .badge-line-2 {
      font-size: 0.8rem;
      opacity: 0.95;
      display: block;
    }
    .booking-badge.confirmed {
      background-color: var(--confirmed-bg);
      color: var(--confirmed-text);
      border: 1px solid var(--confirmed-border);
    }
    .booking-badge.pending {
      background-color: var(--pending-bg);
      color: var(--pending-text);
      border: 1px dashed var(--pending-border);
    }

    /* Modals */
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(74, 58, 42, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 1rem;
    }
    .modal.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      background: var(--card-bg);
      padding: 2.5rem;
      border-radius: 8px;
      width: 100%;
      max-width: 550px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 1rem;
    }
    .modal-header h3 {
      font-family: var(--font-title);
      font-size: 1.5rem;
      color: var(--text-brown);
    }
    .close-btn {
      background: none;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      color: var(--text-muted);
      line-height: 1;
    }

    /* Forms */
    .form-group {
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .form-group label {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-brown);
    }
    .form-group input, .form-group select, .form-group textarea {
      padding: 0.8rem 1rem;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      font-size: 1rem;
      font-family: var(--font-body);
      background-color: #FAF8F5;
      color: var(--text-brown);
      outline: none;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--accent-gold);
      background-color: var(--card-bg);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn {
      display: inline-block;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      border: 1px solid var(--accent-gold);
      background-color: var(--accent-gold);
      color: var(--card-bg);
      border-radius: 4px;
      cursor: pointer;
      transition: var(--transition);
      width: 100%;
      font-family: var(--font-body);
    }
    .btn:hover {
      background-color: #A37F65;
      border-color: #A37F65;
    }

    /* Admin specific */
    .admin-panel {
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
    }
    .admin-panel h3 {
      font-family: var(--font-title);
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 0.5rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      text-align: left;
    }
    table th, table td {
      padding: 1rem 0.5rem;
      border-bottom: 1px solid var(--border-light);
    }
    table th {
      color: var(--text-muted);
      font-weight: 700;
    }

    /* Legend */
    .legend-container {
      display: flex;
      justify-content: flex-end;
      gap: 1.5rem;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .legend-color {
      width: 16px; height: 16px; border-radius: 3px;
    }
    .legend-color.confirmed { background-color: var(--confirmed-bg); border: 1px solid var(--confirmed-border); }
    .legend-color.pending { background-color: var(--pending-bg); border: 1px dashed var(--pending-border); }

    /* Mobile overrides */
    @media (max-width: 768px) {
      body { font-size: 16px; } /* Ensures readability but fits nicely */
      h1 { font-size: 2.5rem; }
      .header-links-bar { gap: 1rem; flex-direction: column; align-items: center; }
      .header-link-item { font-size: 0.95rem; }
      .calendar-grid { min-height: 500px; }
      .day-cell { min-height: 80px; padding: 0.2rem; }
      .booking-badge { font-size: 0.75rem; padding: 0.3rem; }
      .badge-line-2 { font-size: 0.7rem; }
      .modal-content { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="admin-link-wrapper">
    <button onclick="toggleViewMode()" class="admin-link" id="btn-toggle-view">관리자 모드</button>
  </div>

  <header>
    <div class="sub-title">예약 및 문의</div>
    <h1>Innamorare Studio</h1>
    <div id="notice-box" style="margin: 1.5rem auto; max-width: 600px; padding: 1.5rem; background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-light); font-size: 0.95rem; text-align: left; display: block; line-height: 1.6; white-space: pre-wrap;">등록된 공지사항이 없습니다.</div>
    <div class="header-links-bar">
      <a href="#" id="link-directions" class="header-link-item" target="_blank">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;"><circle cx="12" cy="10" r="3"/><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/></svg>
        오시는 길
      </a>
      <a href="#" id="link-price" class="header-link-item" onclick="openPriceModal(event)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
        가격 안내
      </a>
      <a href="#" id="link-inquiry" class="header-link-item" target="_blank">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        예약 문의 (DM)
      </a>
    </div>
  </header>

  <!-- Visitor View -->
  <div id="view-visitor" class="view-section active container">

    <div class="legend-container">
      <div class="legend-item"><span class="legend-color confirmed"></span>예약완료</div>
      <div class="legend-item"><span class="legend-color pending"></span>예약대기</div>
    </div>

    <div class="calendar-nav">
      <button onclick="prevMonth()">&lt; 이전달</button>
      <h2 id="calendar-title">2026.06</h2>
      <button onclick="nextMonth()">다음달 &gt;</button>
    </div>

    <div class="calendar-grid" id="calendar-grid"></div>
  </div>

  <!-- Admin View -->
  <div id="view-admin" class="view-section container">
    
    <div id="admin-login-card" class="admin-panel" style="max-width: 450px; margin: 2rem auto;">
      <h3 style="border:none; text-align:center;">관리자 로그인</h3>
      <form onsubmit="handleAdminLogin(event)">
        <div class="form-group">
          <label>아이디</label>
          <input type="text" id="login-id" required autocapitalize="none" autocorrect="off">
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="login-pw" required autocapitalize="none" autocorrect="off">
        </div>
        <button type="submit" class="btn" style="margin-top: 1rem;">로그인</button>
      </form>
    </div>

    <div id="admin-operations" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2 style="font-family: var(--font-title); font-size: 2rem;">관리자 모드</h2>
        <button onclick="handleAdminLogout()" class="btn" style="width: auto; padding: 0.5rem 1rem; background: var(--card-bg); color: var(--text-brown); border-color: var(--border-light);">로그아웃</button>
      </div>

      <div class="admin-panel">
        <div class="calendar-nav">
          <button onclick="prevMonth()">&lt; 이전달</button>
          <h2 id="admin-calendar-title">2026.06</h2>
          <button onclick="nextMonth()">다음달 &gt;</button>
        </div>
        <div class="calendar-grid" id="admin-calendar-grid"></div>
      </div>

      <div class="admin-panel">
        <h3>전체 예약 목록 (최근 순)</h3>
        <div style="overflow-x: auto;">
          <table>
            <thead>
              <tr>
                <th>이용일</th>
                <th>시간</th>
                <th>공간</th>
                <th>예약자</th>
                <th>연락처</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="reservations-list-body"></tbody>
          </table>
        </div>
      </div>

      <div class="admin-panel">
        <h3>링크 및 설정 관리</h3>
        <div class="form-group">
          <label>공지사항 (텍스트)</label>
          <textarea id="input-setting-notice" rows="4" placeholder="공지사항을 입력하세요..."></textarea>
        </div>
        <div class="form-group">
          <label>예약 문의 (DM) 링크</label>
          <input type="text" id="input-setting-inquiry" placeholder="https://...">
        </div>
        <div class="form-group">
          <label>오시는 길 링크</label>
          <input type="text" id="input-setting-directions" placeholder="https://...">
        </div>
        <h4 style="margin-top: 1.5rem; margin-bottom: 0.5rem; color: var(--text-brown);">[가격 안내 설정]</h4>
        <div class="form-group">
          <label>텍스트</label>
          <textarea id="input-setting-price-text" rows="4" placeholder="가격 안내 상세 내용..."></textarea>
        </div>
        <div class="form-group">
          <label>이미지 첨부 (최대 2MB 권장)</label>
          <input type="file" id="input-setting-price-image" accept="image/*" onchange="handleImageUpload(event)">
          <div id="price-image-preview-container" style="display:none; margin-top: 0.5rem;">
            <img id="price-image-preview" src="" style="max-height: 100px; border-radius: 4px;">
            <button type="button" onclick="clearPriceImage()" style="margin-left: 1rem; padding: 0.3rem 0.6rem;">이미지 삭제</button>
          </div>
        </div>
        <div class="form-group">
          <label>외부 링크</label>
          <input type="text" id="input-setting-price-link" placeholder="https://...">
        </div>
        
        <button class="btn" onclick="saveSettings()" style="margin-top: 1rem;">설정 저장</button>
      </div>

    </div>
  </div>

  <!-- Registration/Edit Modal (Admin Only) -->
  <div class="modal" id="reg-modal" onclick="closeModal(event, 'reg-modal')">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="form-panel-title">예약 등록</h3>
        <button class="close-btn" onclick="hideModal('reg-modal')">&times;</button>
      </div>
      <form id="reservation-form" onsubmit="saveReservation(event)">
        <input type="hidden" id="res-id" value="">
        <div class="form-group">
          <label>예약자명 *</label>
          <input type="text" id="res-name" required>
        </div>
        <div class="form-group">
          <label>연락처</label>
          <input type="text" id="res-contact">
        </div>
        <div class="form-group">
          <label>예약 날짜 *</label>
          <input type="date" id="res-date" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>시작 시간 *</label>
            <select id="res-start-hour" required onchange="updateEndHourOptions()"></select>
          </div>
          <div class="form-group">
            <label>종료 시간 *</label>
            <select id="res-end-hour" required></select>
          </div>
        </div>
        <div class="form-group">
          <label>이용할 층 *</label>
          <select id="res-room" required>
            <option value="1층">1층</option>
            <option value="2층">2층</option>
            <option value="전체">전체</option>
          </select>
        </div>
        <div class="form-group">
          <label>상태 *</label>
          <select id="res-status" required>
            <option value="pending">예약대기</option>
            <option value="confirmed">예약완료</option>
          </select>
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
          <button type="submit" class="btn" style="flex: 2;">저장</button>
          <button type="button" id="btn-delete" class="btn" style="flex: 1; background: #E07A5F; border-color: #E07A5F; display: none;" onclick="deleteReservation()">삭제</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Detail Modal (Visitor) -->
  <div class="modal" id="detail-modal" onclick="closeModal(event, 'detail-modal')">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-room-title">대관 정보</h3>
        <button class="close-btn" onclick="hideModal('detail-modal')">&times;</button>
      </div>
      <div style="font-size: 1.1rem; line-height: 1.8;">
        <p><strong>상태:</strong> <span id="modal-status"></span></p>
        <p><strong>일자:</strong> <span id="modal-date"></span></p>
        <p><strong>시간:</strong> <span id="modal-time"></span></p>
        <p><strong>예약자:</strong> <span id="modal-name"></span></p>
      </div>
    </div>
  </div>

  <!-- Price Guide Modal -->
  <div class="modal" id="price-modal" onclick="closeModal(event, 'price-modal')">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 style="font-family: var(--font-title); font-size: 1.5rem; color: var(--text-brown);">가격 안내</h3>
        <button class="close-btn" onclick="hideModal('price-modal')">&times;</button>
      </div>
      <div id="price-content" style="font-size: 1rem; line-height: 1.8; white-space: pre-wrap;"></div>
      <div id="price-image-container" style="margin-top: 1rem; text-align: center; display: none;">
        <img id="price-image" style="max-width: 100%; border-radius: 4px;" src="" alt="Price Guide">
      </div>
      <div id="price-link-container" style="margin-top: 1.5rem; text-align: center; display: none;">
        <a id="price-link" href="#" target="_blank" class="btn" style="display: inline-block;">상세 가격 확인하기 (링크)</a>
      </div>
    </div>
  </div>

  <script>
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbyXS_-s8my8kV7HAzqGL6-7CI8HSQCrLG7jF1Wr92sPVDfSCAcHkt9eFDkVtr9PY3B5ew/exec";
    
    let currentDate = new Date();
    // currentDate.setFullYear(2026, 5, 21); // Remove this to load actual current month
    
    let reservations = [];
    let currentFilter = '전체';
    let isAdminLoggedIn = false;
    let isViewModeAdmin = false;

    // Load Settings safely
    let appSettings = {};
    try {
      appSettings = JSON.parse(localStorage.getItem('203snap_admin_settings') || "{}");
    } catch(e) {
      appSettings = {};
    }

    async function fetchData() {
      try {
        const res = await fetch(`${SHEET_API_URL}?action=getData`);
        const data = await res.json();
        reservations = data.reservations || [];
        
        // Extract Settings from reservations to sync across devices
        const settingsRes = reservations.find(r => r.name === "SETTINGS_DATA");
        if (settingsRes) {
          try {
            const fetchedSettings = JSON.parse(settingsRes.description);
            appSettings = { ...appSettings, ...fetchedSettings };
            localStorage.setItem('203snap_admin_settings', JSON.stringify(appSettings));
          } catch(e) {}
          reservations = reservations.filter(r => r.name !== "SETTINGS_DATA");
        }
      } catch (err) {
        console.error("Fetch API fail, using local storage fallback.");
        try {
          reservations = JSON.parse(localStorage.getItem('203snap_data')) || [];
        } catch(e) {
          reservations = [];
        }
      }
      if (!Array.isArray(reservations)) reservations = [];
      renderAll();
    }

    async function postData() {
      try {
        await fetch(SHEET_API_URL, {
          method: "POST", mode: "cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "saveReservations", reservations })
        });
      } catch (err) {
        localStorage.setItem('203snap_data', JSON.stringify(reservations));
      }
    }

    function toggleViewMode() {
      isViewModeAdmin = !isViewModeAdmin;
      document.getElementById('btn-toggle-view').innerText = isViewModeAdmin ? "일반 모드" : "관리자 모드";
      document.getElementById('view-visitor').classList.toggle('active', !isViewModeAdmin);
      document.getElementById('view-admin').classList.toggle('active', isViewModeAdmin);
      
      if (isViewModeAdmin && sessionStorage.getItem('admin_logged') === 'true') {
        isAdminLoggedIn = true;
        document.getElementById('admin-login-card').style.display = 'none';
        document.getElementById('admin-operations').style.display = 'block';
        loadSettingsInputs();
        renderAdminCalendar();
        renderReservationsTable();
      }
    }

    function loadSettingsInputs() {
      document.getElementById('input-setting-notice').value = appSettings.notice || '';
      document.getElementById('input-setting-inquiry').value = appSettings.inquiry || '';
      document.getElementById('input-setting-directions').value = appSettings.directions || '';
      document.getElementById('input-setting-price-text').value = appSettings.priceText || '';
      document.getElementById('input-setting-price-link').value = appSettings.priceLink || '';
      if (appSettings.priceImage) {
        uploadedPriceImage = appSettings.priceImage;
        document.getElementById('price-image-preview-container').style.display = 'block';
        document.getElementById('price-image-preview').src = appSettings.priceImage;
      } else {
        document.getElementById('price-image-preview-container').style.display = 'none';
      }
    }

    let uploadedPriceImage = null;
    function handleImageUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 600;
          let width = img.width;
          let height = img.height;
          if (width > MAX_WIDTH) {
            height = Math.round(height * MAX_WIDTH / width);
            width = MAX_WIDTH;
          }
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          uploadedPriceImage = canvas.toDataURL('image/jpeg', 0.5); // Resize and compress for cloud sync
          document.getElementById('price-image-preview-container').style.display = 'block';
          document.getElementById('price-image-preview').src = uploadedPriceImage;
        };
        img.src = evt.target.result;
      };
      reader.readAsDataURL(file);
    }

    function clearPriceImage() {
      uploadedPriceImage = null;
      document.getElementById('input-setting-price-image').value = '';
      document.getElementById('price-image-preview-container').style.display = 'none';
      document.getElementById('price-image-preview').src = '';
      if(appSettings) {
         appSettings.priceImage = null;
      }
    }

    async function saveSettings() {
      appSettings = {
        notice: document.getElementById('input-setting-notice').value.trim(),
        inquiry: document.getElementById('input-setting-inquiry').value.trim(),
        directions: document.getElementById('input-setting-directions').value.trim(),
        priceText: document.getElementById('input-setting-price-text').value.trim(),
        priceLink: document.getElementById('input-setting-price-link').value.trim(),
        priceImage: uploadedPriceImage
      };
      localStorage.setItem('203snap_admin_settings', JSON.stringify(appSettings));
      
      const settingsStr = JSON.stringify(appSettings);
      let settingsRes = reservations.find(r => r.name === "SETTINGS_DATA");
      if (settingsRes) {
        settingsRes.description = settingsStr;
      } else {
        reservations.push({
          id: Date.now() + 999999,
          start_date: "2099-12-31",
          start_hour: 0, end_hour: 0,
          room: "1층",
          name: "SETTINGS_DATA",
          contact: "", status: "confirmed",
          parking_count: "", guest_count: "", total_price: "",
          description: settingsStr
        });
      }
      
      await postData();
      applySettings();
      alert('설정이 클라우드에 성공적으로 저장되었습니다.');
    }

    function applySettings() {
      // Notice box
      const noticeBox = document.getElementById('notice-box');
      noticeBox.style.display = 'block';
      if (appSettings.notice) {
        noticeBox.innerText = appSettings.notice;
      } else {
        noticeBox.innerText = "등록된 공지사항이 없습니다.";
      }

      const updateLink = (id, url) => {
        const el = document.getElementById(id);
        el.classList.remove('hidden');
        if (url) {
          el.href = url;
        } else {
          el.href = "#";
        }
      };
      updateLink('link-inquiry', appSettings.inquiry);
      updateLink('link-directions', appSettings.directions);

      // Price guide button visibility
      const priceBtn = document.getElementById('link-price');
      priceBtn.classList.remove('hidden');
    }

    function openPriceModal(e) {
      e.preventDefault();
      const content = document.getElementById('price-content');
      const imgContainer = document.getElementById('price-image-container');
      const img = document.getElementById('price-image');
      const linkContainer = document.getElementById('price-link-container');
      const link = document.getElementById('price-link');

      if (appSettings.priceText) {
        content.innerText = appSettings.priceText;
        content.style.display = 'block';
      } else {
        content.style.display = 'none';
      }

      if (appSettings.priceImage) {
        img.src = appSettings.priceImage;
        imgContainer.style.display = 'block';
      } else {
        imgContainer.style.display = 'none';
      }

      if (appSettings.priceLink) {
        link.href = appSettings.priceLink;
        linkContainer.style.display = 'block';
      } else {
        linkContainer.style.display = 'none';
      }
      document.getElementById('price-modal').classList.add('show');
    }

    function handleAdminLogin(e) {
      e.preventDefault();
      const pw = document.getElementById('login-pw').value;
      if (pw === '0203') { // Master password
        sessionStorage.setItem('admin_logged', 'true');
        isAdminLoggedIn = true;
        document.getElementById('admin-login-card').style.display = 'none';
        document.getElementById('admin-operations').style.display = 'block';
        loadSettingsInputs();
        renderAdminCalendar();
        renderReservationsTable();
      } else {
        alert("비밀번호가 올바르지 않습니다.");
      }
    }

    function handleAdminLogout() {
      sessionStorage.removeItem('admin_logged');
      isAdminLoggedIn = false;
      document.getElementById('admin-login-card').style.display = 'block';
      document.getElementById('admin-operations').style.display = 'none';
    }

    function setFilter(f) {
      currentFilter = f;
      // Filter functionality removed from visitor view, keeping this stub just in case
      renderCalendar();
    }

    function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); renderAll(); }
    function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); renderAll(); }

    function renderAll() {
      if (isViewModeAdmin && isAdminLoggedIn) {
        renderAdminCalendar();
        renderReservationsTable();
      } else {
        renderCalendar();
      }
    }

    function maskName(name) {
      if (!name) return "";
      let c = String(name).trim().replace(/님$/, '');
      if (c.length <= 1) return c + '님';
      return c.charAt(0) + '*'.repeat(c.length - 1) + '님';
    }

    function renderGrid(gridId, isAdminGrid) {
      const y = currentDate.getFullYear();
      const m = currentDate.getMonth();
      document.getElementById(isAdminGrid ? 'admin-calendar-title' : 'calendar-title').innerText = `${y}.${String(m+1).padStart(2,'0')}`;
      
      const grid = document.getElementById(gridId);
      grid.innerHTML = '';
      
      ['일','월','화','수','목','금','토'].forEach(d => {
        const h = document.createElement('div'); h.className = 'day-header'; h.innerText = d; grid.appendChild(h);
      });

      const firstDay = new Date(y, m, 1).getDay();
      const totalDays = new Date(y, m + 1, 0).getDate();
      const prevDays = new Date(y, m, 0).getDate();

      for (let i = firstDay - 1; i >= 0; i--) grid.appendChild(createCell(y, m - 1, prevDays - i, true, isAdminGrid));
      for (let i = 1; i <= totalDays; i++) grid.appendChild(createCell(y, m, i, false, isAdminGrid));
      
      const rem = (7 - ((firstDay + totalDays) % 7)) % 7;
      for (let i = 1; i <= rem; i++) grid.appendChild(createCell(y, m + 1, i, true, isAdminGrid));
    }

    function createCell(y, m, d, isOther, isAdmin) {
      const dateObj = new Date(y, m, d);
      const ds = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;
      
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (isOther ? ' other-month' : '');
      if (dateObj.toDateString() === new Date().toDateString()) cell.classList.add('today');

      cell.onclick = () => {
        if (isAdmin) openRegModal(ds);
      };

      const nd = document.createElement('div');
      nd.className = 'day-number';
      nd.innerText = d;
      cell.appendChild(nd);

      const dayRes = reservations.filter(r => r && r.start_date && r.start_date.substring(0,10) === ds && (isAdmin || currentFilter === '전체' || (r.room && r.room.includes(currentFilter)) || r.room === '전체'));
      dayRes.sort((a,b) => (a.start_hour || 0) - (b.start_hour || 0));

      dayRes.forEach(r => {
        const badge = document.createElement('div');
        badge.className = `booking-badge ${r.status || 'pending'}`;
        const name = maskName(r.name);
        const roomName = r.room ? r.room : '';
        // Event Content: TWO LINES. Name / (Time) Floor.
        badge.innerHTML = `<span class="badge-line-1">${name}</span><span class="badge-line-2">(${r.start_hour || ''}~${r.end_hour || ''}시) ${roomName}</span>`;
        badge.onclick = (e) => { e.stopPropagation(); isAdmin ? openRegModal(ds, r) : openDetailModal(r); };
        cell.appendChild(badge);
      });
      return cell;
    }

    function renderCalendar() { renderGrid('calendar-grid', false); }
    function renderAdminCalendar() { renderGrid('admin-calendar-grid', true); }

    function renderReservationsTable() {
      const tbody = document.getElementById('reservations-list-body');
      tbody.innerHTML = '';
      [...reservations].sort((a,b) => {
        const da = a.start_date || '';
        const db = b.start_date || '';
        return db.localeCompare(da);
      }).forEach(r => {
        const tr = document.createElement('tr');
        tr.style.cursor = 'pointer';
        tr.onclick = () => openRegModal(r.start_date, r);
        tr.innerHTML = `<td>${r.start_date || ''}</td><td>${r.start_hour || ''}~${r.end_hour || ''}시</td><td>${r.room || ''}</td><td>${r.name || ''}</td><td>${r.contact || ''}</td><td>${r.status==='confirmed'?'완료':'대기'}</td>`;
        tbody.appendChild(tr);
      });
    }

    function initHours() {
      const sh = document.getElementById('res-start-hour');
      for(let i=0; i<=23; i++) sh.innerHTML += `<option value="${i}">${i}시</option>`;
      updateEndHourOptions();
    }

    function updateEndHourOptions() {
      const st = parseInt(document.getElementById('res-start-hour').value) || 9;
      const eh = document.getElementById('res-end-hour');
      const cur = parseInt(eh.value);
      eh.innerHTML = '';
      for(let i=st+1; i<=24; i++) eh.innerHTML += `<option value="${i}" ${i===cur?'selected':''}>${i}시</option>`;
    }

    function openRegModal(dateStr, res = null) {
      document.getElementById('res-date').value = dateStr;
      if (res) {
        document.getElementById('form-panel-title').innerText = '예약 수정';
        document.getElementById('res-id').value = res.id;
        document.getElementById('res-name').value = res.name;
        document.getElementById('res-contact').value = res.contact;
        document.getElementById('res-start-hour').value = res.start_hour;
        updateEndHourOptions();
        document.getElementById('res-end-hour').value = res.end_hour;
        document.getElementById('res-room').value = res.room;
        document.getElementById('res-status').value = res.status;
        document.getElementById('btn-delete').style.display = 'block';
      } else {
        document.getElementById('form-panel-title').innerText = '예약 등록';
        document.getElementById('res-id').value = '';
        document.getElementById('res-name').value = '';
        document.getElementById('res-contact').value = '';
        document.getElementById('res-start-hour').value = 9;
        updateEndHourOptions();
        document.getElementById('res-room').value = '1층';
        document.getElementById('res-status').value = 'pending';
        document.getElementById('btn-delete').style.display = 'none';
      }
      document.getElementById('reg-modal').classList.add('show');
    }

    async function saveReservation(e) {
      e.preventDefault();
      const id = document.getElementById('res-id').value;
      const r = {
        name: document.getElementById('res-name').value.trim(),
        contact: document.getElementById('res-contact').value.trim(),
        start_date: document.getElementById('res-date').value,
        start_hour: parseInt(document.getElementById('res-start-hour').value),
        end_hour: parseInt(document.getElementById('res-end-hour').value),
        room: document.getElementById('res-room').value,
        status: document.getElementById('res-status').value,
        parking_count: "",
        guest_count: "",
        total_price: "",
        description: ""
      };

      // Duplicate Check
      const overlap = reservations.find(ex => ex.start_date === r.start_date && ex.id != id && 
        Math.max(r.start_hour, ex.start_hour) < Math.min(r.end_hour, ex.end_hour) && 
        (r.room === ex.room || r.room === '전체' || ex.room === '전체')
      );
      if (overlap) return alert('해당 시간에 이미 겹치는 예약이 존재합니다.');

      if (id) {
        r.id = parseInt(id);
        const idx = reservations.findIndex(x => x.id == id);
        reservations[idx] = r;
      } else {
        r.id = Date.now();
        reservations.push(r);
      }
      
      hideModal('reg-modal');
      await postData();
      renderAll();
      alert('저장되었습니다.');
    }

    async function deleteReservation() {
      if(!confirm('삭제하시겠습니까?')) return;
      const id = document.getElementById('res-id').value;
      reservations = reservations.filter(r => r.id != id);
      hideModal('reg-modal');
      await postData();
      renderAll();
    }

    function openDetailModal(r) {
      document.getElementById('modal-room-title').innerText = `[${r.room}] 대관 정보`;
      document.getElementById('modal-status').innerText = r.status === 'confirmed' ? '예약완료' : '예약대기';
      document.getElementById('modal-status').style.color = r.status === 'confirmed' ? 'var(--confirmed-bg)' : 'var(--pending-text)';
      document.getElementById('modal-date').innerText = r.start_date;
      document.getElementById('modal-time').innerText = `${r.start_hour}시 ~ ${r.end_hour}시`;
      document.getElementById('modal-name').innerText = maskName(r.name);
      document.getElementById('detail-modal').classList.add('show');
    }

    function hideModal(id) { document.getElementById(id).classList.remove('show'); }
    function closeModal(e, id) { if(e.target.id === id) hideModal(id); }

    window.onload = () => {
      initHours();
      applySettings();
      fetchData();
    };
  </script>
</body>
</html>
